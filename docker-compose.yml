services:
  skrejper:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: skrejper:latest
    container_name: skrejper
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
